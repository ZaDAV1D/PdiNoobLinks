<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>PdiNoob • Official Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:
radial-gradient(circle at top,#2d2d2d 0%,#111 20%,#050505 50%,black 100%);
overflow:hidden;
height:100vh;
color:white;
position:relative;
}

body::before{
content:"";
position:fixed;
top:-30%;
left:-20%;
width:160%;
height:160%;

background:
radial-gradient(circle,rgba(255,255,255,.15),transparent 25%),
radial-gradient(circle at 30% 20%,rgba(255,255,255,.06),transparent 40%),
radial-gradient(circle at 70% 70%,rgba(255,255,255,.08),transparent 30%);

filter:blur(120px);

animation:
movebg 12s infinite alternate;

z-index:-3;
}

body::after{

content:"";

position:fixed;

width:100%;

height:100%;

background:
radial-gradient(white 1px,transparent 1px);

background-size:42px 42px;

opacity:.06;

animation:
stars 35s linear infinite;

z-index:-2;

}

@keyframes movebg{

0%{
transform:
translate(-5%,-5%)
scale(1);
}

100%{
transform:
translate(5%,5%)
scale(1.25);
}

}

@keyframes stars{

to{
transform:
translateY(100px);
}

}

.loader{

position:fixed;

width:100%;

height:100%;

background:black;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:999;

animation:
close 1.2s ease 4s forwards;

}

.loader img{

width:320px;

animation:
glow 2s infinite alternate,
float 3s infinite;

}

.loader h1{

margin-top:35px;

font-size:42px;

font-weight:900;

letter-spacing:10px;

}

.loader p{

opacity:.6;

}

@keyframes close{

to{

opacity:0;

visibility:hidden;

}

}

@keyframes glow{

from{

filter:
drop-shadow(0 0 25px white);

}

to{

filter:
drop-shadow(0 0 120px white);

}

}

@keyframes float{

50%{

transform:
translateY(-15px);

}

}

.main{

width:100%;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.ring{

position:absolute;

border-radius:50%;

animation:
spin 20s linear infinite;

}

.r1{

width:1100px;

height:1100px;

border:
1px solid rgba(255,255,255,.08);

box-shadow:
0 0 280px rgba(255,255,255,.18);

}

.r2{

width:760px;

height:760px;

border:
2px solid rgba(255,255,255,.12);

animation-direction:reverse;

}

@keyframes spin{

to{

transform:
rotate(360deg);

}

}

.card{

width:620px;

padding:60px;

text-align:center;

background:
linear-gradient(
180deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

backdrop-filter:blur(40px);

border:
1px solid rgba(255,255,255,.10);

border-radius:42px;

box-shadow:
0 0 220px rgba(255,255,255,.12);

animation:
open 1.3s;

}

@keyframes open{

from{

opacity:0;

transform:
translateY(60px);

}

}

.profile{

width:260px;

border-radius:100%;

box-shadow:
0 0 90px white;

transition:.4s;

}

.profile:hover{

transform:
scale(1.06);

}

.title{

margin-top:28px;

font-size:68px;

font-weight:900;

}

.bio{

font-size:20px;

opacity:.65;

margin-top:10px;

margin-bottom:45px;

}

.link{

display:block;

margin:20px;

padding:24px;

border-radius:26px;

text-decoration:none;

color:white;

font-size:28px;

background:
linear-gradient(
90deg,
#111,
#1a1a1a
);

transition:.35s;

}

.link:hover{

transform:
translateY(-6px)
scale(1.04);

background:white;

color:black;

box-shadow:
0 0 80px white;

}

.credit{

margin-top:42px;

opacity:.45;

font-size:16px;

letter-spacing:4px;

}

.credit span{

font-weight:900;

}

@media(max-width:700px){

body{

overflow:auto;

}

.card{

width:92%;

padding:35px;

margin:50px 0;

}

.title{

font-size:44px;

}

.profile{

width:180px;

}

.link{

font-size:22px;

padding:20px;

}

.loader img{

width:200px;

}

}

</style>

</head>

<body>

<div class="loader">

<img src="logo.png">

<h1>PDINOOB</h1>

<p>ENTERING...</p>

</div>

<div class="main">

<div class="ring r1"></div>

<div class="ring r2"></div>

<div class="card">

<img src="logo.png" class="profile">

<div class="title">

PdiNoob

</div>

<div class="bio">

Gaming • Streams • Content

</div>

<a class="link"
href="https://www.tiktok.com/@pdinoob"
target="_blank">

🎵 TikTok

</a>

<a class="link"
href="https://www.youtube.com/@PdiNoob3"
target="_blank">

▶ YouTube

</a>

<a class="link"
href="https://kick.com/pdinoob"
target="_blank">

🟢 Kick

</a>

<a class="link"
href="https://discord.gg/sk5eSzhbD"
target="_blank">

💬 Discord

</a>

<div class="credit">

Created by <span>ZaDAV1D</span>

</div>

</div>

</div>

</body>

</html>
