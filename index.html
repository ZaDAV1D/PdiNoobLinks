<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>PdiNoob • Official Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

color:white;

background:

radial-gradient(circle at center,
#303030,
#111 35%,
#050505 70%,
#000);

position:relative;

}

body::before{

content:"";

position:absolute;

width:120vw;

height:120vw;

background:

radial-gradient(
circle,
rgba(255,255,255,.12),
transparent 30%
);

filter:blur(120px);

animation:
bg 10s infinite alternate;

}

@keyframes bg{

100%{

transform:
scale(1.2)
translateY(-40px);

}

}

.loader{

position:fixed;

inset:0;

background:black;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

z-index:999;

animation:
close 1s ease 4s forwards;

}

.loader img{

width:260px;

animation:
float 3s infinite,
glow 2s infinite alternate;

}

.loader h1{

margin-top:30px;

font-size:42px;

letter-spacing:8px;

}

.loader p{

opacity:.5;

}

@keyframes close{

to{

opacity:0;

visibility:hidden;

}

}

@keyframes glow{

from{

filter:
drop-shadow(0 0 20px white);

}

to{

filter:
drop-shadow(0 0 100px white);

}

}

@keyframes float{

50%{

transform:
translateY(-15px);

}

}

.card{

position:relative;

z-index:2;

width:min(560px,92vw);

padding:36px;

border-radius:36px;

text-align:center;

background:

linear-gradient(
180deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

backdrop-filter:

blur(30px);

border:

1px solid rgba(255,255,255,.1);

box-shadow:

0 0 150px rgba(255,255,255,.1);

}

.profile{

width:min(180px,38vw);

border-radius:50%;

box-shadow:

0 0 60px white;

}

.title{

margin-top:18px;

font-size:clamp(36px,6vw,62px);

font-weight:900;

}

.bio{

margin-top:8px;

margin-bottom:26px;

opacity:.7;

font-size:clamp(14px,2vw,20px);

}

.link{

display:block;

margin:14px 0;

padding:18px;

border-radius:20px;

text-decoration:none;

font-size:clamp(18px,3vw,24px);

color:white;

background:

linear-gradient(
90deg,
#111,
#1c1c1c
);

transition:.3s;

}

.link:hover{

transform:

translateY(-4px)
scale(1.03);

background:white;

color:black;

box-shadow:

0 0 60px white;

}

.credit{

margin-top:22px;

opacity:.45;

font-size:13px;

letter-spacing:3px;

}

.credit span{

font-weight:900;

}

@media(max-height:850px){

.card{

transform:
scale(.88);

}

}

@media(max-height:720px){

.card{

transform:
scale(.78);

}

}

</style>

</head>

<body>

<div class="loader">

<img src="logo.png">

<h1>PDINOOB</h1>

<p>ENTERING...</p>

</div>

<div class="card">

<img src="logo.png" class="profile">

<div class="title">

PdiNoob

</div>

<div class="bio">

Gaming • Streams • Content

</div>

<a class="link"
href="https://www.tiktok.com/@pdinoob"
target="_blank">

🎵 TikTok

</a>

<a class="link"
href="https://www.youtube.com/@PdiNoob3"
target="_blank">

▶ YouTube

</a>

<a class="link"
href="https://kick.com/pdinoob"
target="_blank">

🟢 Kick

</a>

<a class="link"
href="https://discord.gg/sk5eSzhbD"
target="_blank">

💬 Discord

</a>

<div class="credit">

Created by <span>ZaDAV1D</span>

</div>

</div>

</body>

</html>
